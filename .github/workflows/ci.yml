name: StayEase CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt
      - name: Create backend .env for CI
        run: |
          cat > backend/.env << 'EOF'
          MONGO_URI=mongodb://localhost:27017
          MONGO_DB_NAME=stayease_test
          JWT_SECRET=ci-test-secret-key
          MAIL_USERNAME=
          MAIL_PASSWORD=
          MAIL_FROM=test@stayease.com
          MAIL_SERVER=smtp.gmail.com
          MAIL_PORT=587
          MAIL_USE_TLS=True
          TWILIO_ACCOUNT_SID=
          TWILIO_AUTH_TOKEN=
          TWILIO_WHATSAPP_FROM=whatsapp:+14155238886
          CLOUDINARY_CLOUD_NAME=
          CLOUDINARY_API_KEY=
          CLOUDINARY_API_SECRET=
          OPEN_METEO_BASE_URL=https://api.open-meteo.com
          GST_RATE=0.18
          GST_NUMBER=TEST_GST
          FRONTEND_URL=http://localhost:5173
          APP_NAME=StayEase
          APP_HOST=0.0.0.0
          APP_PORT=8000
          ALLOWED_ORIGINS=http://localhost:5173
          EOF
      - name: Run backend tests with coverage
        run: cd backend && python -m pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: ignore

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - name: Create frontend .env
        run: |
          echo "VITE_API_BASE_URL=http://localhost:8000" > frontend/.env
          echo "VITE_APP_NAME=StayEase" >> frontend/.env
      - name: Run unit tests with coverage
        run: cd frontend && npm run test:coverage
      - name: Production build
        run: cd frontend && npm run build
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
          if-no-files-found: ignore

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install black flake8
      - name: Black format check
        run: black --check backend/
      - name: Flake8
        run: flake8 backend/ --config=backend/.flake8
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - name: ESLint
        run: cd frontend && npm run lint

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - name: npm audit (high severity)
        run: cd frontend && npm audit --audit-level=high || true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pip-audit
      - name: pip-audit backend dependencies
        run: pip-audit -r backend/requirements.txt || true
