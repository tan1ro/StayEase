name: PR Preview Checks
on:
  pull_request:
    branches: [main, dev]

jobs:
  changed-files:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed areas
        id: changes
        run: |
          BACKEND=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -c '^backend/' || true)
          FRONTEND=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -c '^frontend/' || true)
          echo "backend=$BACKEND" >> "$GITHUB_OUTPUT"
          echo "frontend=$FRONTEND" >> "$GITHUB_OUTPUT"
      - name: Summary
        run: |
          echo "Backend files changed: ${{ steps.changes.outputs.backend }}"
          echo "Frontend files changed: ${{ steps.changes.outputs.frontend }}"

  frontend-smoke:
    runs-on: ubuntu-latest
    needs: changed-files
    if: needs.changed-files.outputs.frontend != '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: |
          echo "VITE_API_BASE_URL=http://localhost:8000" > frontend/.env
          echo "VITE_APP_NAME=StayEase" >> frontend/.env
      - run: cd frontend && npm run build
