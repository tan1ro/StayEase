version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    container_name: stayease-mongo
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    environment:
      MONGO_INITDB_DATABASE: stayease
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-init:
    image: mongo:7
    depends_on:
      mongo:
        condition: service_started
    restart: "no"
    entrypoint:
      - bash
      - -c
      - |
        until mongosh --host mongo:27017 --eval "db.adminCommand('ping')" >/dev/null 2>&1; do sleep 1; done
        mongosh --host mongo:27017 --eval "
          try {
            rs.status();
            print('Replica set already initialized');
          } catch (e) {
            rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'mongo:27017'}]});
          }
        "

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    environment:
      MONGO_URI: mongodb://mongo:27017/?replicaSet=rs0
      MONGO_DB_NAME: stayease
      JWT_SECRET: dev-secret-change-in-production
      APP_NAME: StayEase
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      ALLOWED_ORIGINS: http://localhost:5173
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
      MAIL_FROM: noreply@stayease.com
      MAIL_SERVER: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USE_TLS: "True"
      TWILIO_ACCOUNT_SID: ""
      TWILIO_AUTH_TOKEN: ""
      TWILIO_WHATSAPP_FROM: whatsapp:+14155238886
      CLOUDINARY_CLOUD_NAME: ""
      CLOUDINARY_API_KEY: ""
      CLOUDINARY_API_SECRET: ""
      OPEN_METEO_BASE_URL: https://api.open-meteo.com
      GST_RATE: "0.18"
      GST_NUMBER: DEV_GST_NUMBER
      FRONTEND_URL: http://localhost:5173
      JWT_EXPIRE_MINUTES: "10080"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_APP_NAME: StayEase
    ports:
      - "5173:5173"

volumes:
  mongo_data:
