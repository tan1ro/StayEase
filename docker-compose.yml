# Local development: MongoDB + API (frontend runs separately or on Vercel)
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    container_name: stayease-mongo
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    environment:
      MONGO_INITDB_DATABASE: stayease
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-init:
    image: mongo:7
    depends_on:
      mongo:
        condition: service_started
    restart: "no"
    entrypoint:
      - bash
      - -c
      - |
        until mongosh --host mongo:27017 --eval "db.adminCommand('ping')" >/dev/null 2>&1; do sleep 1; done
        mongosh --host mongo:27017 --eval "
          try {
            rs.status();
            print('Replica set already initialized');
          } catch (e) {
            rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'mongo:27017'}]});
          }
        "

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stayease-api
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    env_file:
      - ./backend/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/?replicaSet=rs0
      MONGO_DB_NAME: stayease
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      FRONTEND_URL: http://localhost:5173
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  mongo_data:
