# Fly.io config — free allowance (alternative to Render)
# Deploy from backend/: fly launch --no-deploy && fly secrets import < .env && fly deploy
app = "stayease-api"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_NAME = "StayEase"
  APP_HOST = "0.0.0.0"
  APP_PORT = "8000"
  MONGO_DB_NAME = "stayease"
  JWT_EXPIRE_MINUTES = "10080"
  MAIL_SERVER = "smtp.gmail.com"
  MAIL_PORT = "587"
  MAIL_USE_TLS = "True"
  OPEN_METEO_BASE_URL = "https://api.open-meteo.com"
  GST_RATE = "0.18"
  GUEST_PLATFORM_FEE_PERCENT = "10.0"
  HOST_PLATFORM_FEE_PERCENT = "3.0"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
