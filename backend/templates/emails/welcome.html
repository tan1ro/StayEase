<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font-family: Inter, Arial, sans-serif; background: #F7F9FC; color: #0D1B3E; margin: 0; padding: 24px; }
    .card { background: #fff; border-radius: 16px; padding: 32px; max-width: 600px; margin: 0 auto; }
    h1 { color: #1A6BFF; }
    .code { font-size: 22px; font-weight: 700; color: #00A699; letter-spacing: 2px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome to StayEase</h1>
    <p>Hi {{ user.name }}, thanks for joining StayEase.</p>
    <p>Your referral code: <span class="code">{{ user.referral_code }}</span></p>
    <p>Share it with friends and earn referral credits on their first booking.</p>
  </div>
</body>
</html>
